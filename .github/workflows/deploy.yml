name: Deploy Hotel Booking AI

# Trigger on push to main OR manual dispatch
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target: all | hf_space | render"
        required: false
        default: "all"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Test ────────────────────────────────────────────────────────────────────
  test:
    name: Lint + syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install lightweight deps (Render only)
        run: pip install -r requirements-render.txt

      - name: Syntax-check Render webhook
        run: python -m py_compile main.py && echo "main.py OK"

      - name: Check no stale SUPABASE_URL references
        run: |
          if grep -rn 'SUPABASE_URL\s*=\s*os' --include='*.py' .; then
            echo "ERROR: stale SUPABASE_URL reference found"; exit 1
          fi
          echo "No stale Supabase references ✅"

  # ── Deploy HuggingFace Space ────────────────────────────────────────────────
  deploy-hf-space:
    name: Deploy HuggingFace Space
    needs: test
    runs-on: ubuntu-latest
    if: >
      github.ref == 'refs/heads/main' &&
      (github.event.inputs.target == 'all' || github.event.inputs.target == 'hf_space' || github.event.inputs.target == '')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install HuggingFace Hub CLI
        run: pip install huggingface_hub

      - name: Push full project to HuggingFace Space
        env:
          HF_TOKEN:    ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ secrets.HF_SPACE_ID }}
        run: |
          python - <<'EOF'
          import os
          from huggingface_hub import HfApi

          api = HfApi()
          # Upload entire project so processor.py, db_client.py, autotranslator.py
          # and hf_space/ are all available inside the Docker Space.
          api.upload_folder(
              folder_path=".",
              repo_id=os.environ["HF_SPACE_ID"],
              repo_type="space",
              token=os.environ["HF_TOKEN"],
              commit_message="chore: deploy from CI",
              ignore_patterns=[
                  "__pycache__/**", "*.pyc", ".env*", "*.egg-info/**",
                  ".git/**", ".github/**",
              ],
          )
          print("Upload complete.")
          EOF

      - name: Wait for Space to boot
        env:
          HF_TOKEN:    ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ secrets.HF_SPACE_ID }}
          HF_SPACE_URL: ${{ secrets.HF_SPACE_URL }}
        run: |
          echo "Waiting for HF Space health check..."
          for i in {1..30}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HF_SPACE_URL/health" || echo "000")
            echo "Attempt $i — HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Space is healthy ✅"
              exit 0
            fi
            sleep 20
          done
          echo "⚠️ Space did not become healthy within 10 minutes. Check HF logs."
          exit 1

  # ── Deploy Render Webhook ───────────────────────────────────────────────────
  deploy-render:
    name: Deploy Render Webhook
    needs: test
    runs-on: ubuntu-latest
    if: >
      github.ref == 'refs/heads/main' &&
      (github.event.inputs.target == 'all' || github.event.inputs.target == 'render' || github.event.inputs.target == '')
    steps:
      - uses: actions/checkout@v4

      - name: Trigger Render deploy via API
        env:
          RENDER_API_KEY:      ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID:   ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys")
          echo "Deploy response: $RESPONSE"
          DEPLOY_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))" 2>/dev/null || echo "")
          echo "Deploy ID: $DEPLOY_ID"

      - name: Wait for Render deploy
        env:
          RENDER_WEBHOOK_URL: ${{ secrets.RENDER_WEBHOOK_URL }}
        run: |
          echo "Waiting for Render service health..."
          for i in {1..20}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$RENDER_WEBHOOK_URL/health" || echo "000")
            echo "Attempt $i — HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Render service healthy ✅"
              exit 0
            fi
            sleep 15
          done
          echo "⚠️ Render service did not become healthy. Check Render dashboard."
          exit 1

  # ── Smoke test ──────────────────────────────────────────────────────────────
  smoke-test:
    name: Post-deploy smoke test
    needs: [deploy-hf-space, deploy-render]
    if: always() && (needs.deploy-hf-space.result == 'success' || needs.deploy-render.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Test HF Space /health
        env:
          HF_SPACE_URL: ${{ secrets.HF_SPACE_URL }}
        run: |
          BODY=$(curl -sf "$HF_SPACE_URL/health" || echo "{}")
          echo "Health response: $BODY"
          echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d.get('status') in ('healthy','degraded'), f'Bad status: {d}'"
          echo "✅ HF Space health check passed"

      - name: Test Render /health
        env:
          RENDER_WEBHOOK_URL: ${{ secrets.RENDER_WEBHOOK_URL }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$RENDER_WEBHOOK_URL/health" || echo "000")
          echo "Render health HTTP $STATUS"
          [ "$STATUS" = "200" ] && echo "✅ Render health check passed" || echo "⚠️ Render not healthy"

  # ── Notify on failure ───────────────────────────────────────────────────────
  notify-failure:
    name: Notify on failure
    needs: [test, deploy-hf-space, deploy-render]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack alert
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK" ]; then
            curl -s -X POST "$SLACK_WEBHOOK" -H "Content-Type: application/json" \
              -d "{\"text\":\"❌ Hotel Booking AI deploy FAILED on branch ${{ github.ref }}. See: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
          else
            echo "No Slack webhook configured."
          fi
