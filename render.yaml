services:
  - type: web
    name: bookhotel-webhook
    runtime: python
    buildCommand: pip install -r requirements-render.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: VERIFY_TOKEN
        sync: false          # Set in Render dashboard — must match FB webhook verify token
      - key: PAGE_ACCESS_TOKEN
        sync: false          # Set in Render dashboard — Facebook Page Access Token
      - key: APP_SECRET
        sync: false          # Set in Render dashboard — Facebook App Secret (for HMAC verification)
      - key: HF_PROCESSOR_URL
        value: https://chandrashekar8-bookhotel.hf.space