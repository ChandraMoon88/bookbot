# rasa/data/nlu/nlu_en.yml
# ----------------------------------------
# English NLU training data
# ----------------------------------------

version: "3.1"

nlu:

- intent: greet
  examples: |
    - hi
    - hello
    - hey
    - good morning
    - good evening
    - howdy
    - what's up
    - hiya
    - hi there
    - greetings
    - sup
    - yo
    - good afternoon
    - good day
    - heya
    - hey there
    - hello there
    - hola
    - ahoy
    - bonjour
    - salaam
    - namaste
    - salam
    - start
    - begin

- intent: goodbye
  examples: |
    - bye
    - goodbye
    - see you later
    - good night
    - take care
    - ciao
    - see ya

- intent: affirm
  examples: |
    - yes
    - yep
    - yeah
    - confirm
    - correct
    - that's right
    - ok
    - okay
    - sure
    - absolutely
    - go ahead

- intent: deny
  examples: |
    - no
    - nope
    - not really
    - cancel
    - stop
    - negative
    - I don't want that
    - no thanks

- intent: book_hotel
  examples: |
    - I want to book a hotel
    - book a room
    - I need a hotel
    - find me a hotel
    - hotel reservation please
    - make a booking
    - I'd like to stay at a hotel
    - can you book a hotel room for me
    - hotel booking
    - reserve a hotel
    - I want to travel to [Paris](city) and stay somewhere nice

- intent: provide_city
  examples: |
    - [Paris](city)
    - I want to go to [London](city)
    - [New York](city) please
    - staying in [Tokyo](city)
    - [Dubai](city)
    - [Mumbai](city)
    - [Bangkok](city)
    - [Singapore](city)
    - [Istanbul](city)

- intent: provide_checkin
  examples: |
    - [2025-06-15](date)
    - June 15th
    - next Monday
    - this Friday
    - tomorrow
    - [2025-07-01](date)
    - checking in on [2025-08-10](date)

- intent: provide_guests
  examples: |
    - [2](number) guests
    - just [1](number)
    - [3](number) people
    - [4](number) adults
    - a family of [5](number)
    - only me
    - for [2](number)

- intent: provide_name
  examples: |
    - my name is John Smith
    - it's Maria Garcia
    - Ravi Kumar
    - Ahmed Hassan
    - for Priya Mehta

- intent: provide_email
  examples: |
    - [john@example.com](email)
    - my email is [user@gmail.com](email)
    - [someone@company.org](email)

- intent: provide_phone
  examples: |
    - [+1-555-0100](phone_number)
    - my number is [+44-207-946-0958](phone_number)
    - [+91-9876543210](phone_number)

- intent: confirm_booking
  examples: |
    - confirm
    - yes please confirm
    - book it
    - proceed
    - finalize
    - yes I confirm

- intent: cancel_booking
  examples: |
    - cancel my booking
    - I want to cancel
    - please cancel reservation [BK12345](booking_ref)
    - cancel booking [BK99999](booking_ref)
    - I need to cancel

- intent: view_bookings
  examples: |
    - show my bookings
    - my reservations
    - what bookings do I have
    - view my trips
    - list my bookings
    - upcoming stays

- intent: modify_booking
  examples: |
    - I want to change my booking
    - modify reservation
    - change dates
    - update my booking
    - I need to change the room

- intent: ask_faq
  examples: |
    - what is the check-in time
    - do you have free wifi
    - is breakfast included
    - what's the cancellation policy
    - is parking available
    - are pets allowed
    - what amenities are available

- intent: change_language
  examples: |
    - change language
    - speak to me in [Hindi](language)
    - switch to [French](language)
    - [Telugu](language) please
    - I want [Arabic](language)
    - use [Spanish](language)

- intent: human_handoff
  examples: |
    - talk to an agent
    - real person please
    - human support
    - live agent
    - I want to speak to someone
    - connect me to staff

- intent: out_of_scope
  examples: |
    - what is the weather
    - tell me a joke
    - who won the match
    - what's 2 + 2
    - call a taxi
