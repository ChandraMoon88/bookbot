# rasa/domain.yml
# ------------------------------------------------
# Rasa domain: intents, entities, slots, responses, actions
# ------------------------------------------------

version: "3.1"

intents:
  - greet
  - goodbye
  - affirm
  - deny
  - book_hotel
  - provide_city
  - provide_checkin
  - provide_checkout
  - provide_guests
  - provide_hotel_choice
  - provide_room_choice
  - provide_meal_plan
  - provide_name
  - provide_email
  - provide_phone
  - confirm_booking
  - cancel_booking
  - view_bookings
  - modify_booking
  - ask_faq
  - change_language
  - human_handoff
  - out_of_scope
  - nlu_fallback

entities:
  - city
  - date
  - number
  - email
  - phone_number
  - hotel_name
  - room_type
  - meal_plan
  - language
  - booking_ref

slots:
  city:
    type: text
    mappings:
      - type: from_entity
        entity: city
  check_in:
    type: text
    mappings:
      - type: from_entity
        entity: date
  check_out:
    type: text
    mappings:
      - type: custom
  guests:
    type: float
    mappings:
      - type: from_entity
        entity: number
  hotel_id:
    type: text
    mappings:
      - type: custom
  room_type_id:
    type: text
    mappings:
      - type: custom
  meal_plan:
    type: text
    mappings:
      - type: from_entity
        entity: meal_plan
  guest_name:
    type: text
    mappings:
      - type: custom
  guest_email:
    type: text
    mappings:
      - type: from_entity
        entity: email
  guest_phone:
    type: text
    mappings:
      - type: from_entity
        entity: phone_number
  language:
    type: text
    mappings:
      - type: custom
  booking_ref:
    type: text
    mappings:
      - type: from_entity
        entity: booking_ref
  booking_step:
    type: text
    mappings:
      - type: custom

responses:
  # ── Module 1 responses ──────────────────────────────────────────────────
  # utter_greet is a static fallback only; ActionGreetUser handles the real
  # multilingual greeting dynamically via action_greet_user.
  utter_greet:
    - text: "Hello! I'm your hotel booking assistant. How can I help you today?"
  utter_ask_language_choice:
    - text: "Which language would you prefer? 🌐"
  utter_goodbye:
    - text: "Thank you for using our service. Have a great day! 👋"
  utter_affirm:
    - text: "Great!"
  utter_ask_city:
    - text: "Which city would you like to stay in?"
  utter_ask_checkin:
    - text: "What's your check-in date? (e.g. 2025-06-15)"
  utter_ask_checkout:
    - text: "And what's your check-out date?"
  utter_ask_guests:
    - text: "How many guests will be staying?"
  utter_ask_name:
    - text: "Please provide the full name for the booking."
  utter_ask_email:
    - text: "What's the email address for the confirmation?"
  utter_ask_phone:
    - text: "And your phone number with country code? (e.g. +1-555-0100)"
  utter_fallback:
    - text: "I didn't quite understand that. Could you rephrase? Or type MENU for options."
  utter_handoff:
    - text: "Connecting you to a live agent now, please hold on..."
  utter_out_of_scope:
    - text: "I can only help with hotel bookings. Type MENU to see what I can do."

actions:
  # ── Module 1: Language + Greeting (COMPLETE) ────────────────────────────
  - action_greet_user
  - action_change_language
  - action_session_start
  # ── Module 2+: Booking flow ──────────────────────────────────────────────
  - action_search_hotels
  - action_show_hotels
  - action_select_hotel
  - action_show_rooms
  - action_select_room
  - action_collect_guest_details
  - action_create_booking
  - action_show_my_bookings
  - action_modify_booking
  - action_cancel_booking
  - action_answer_faq
  - action_human_handoff
  - action_default_fallback
  - validate_booking_form

forms:
  booking_form:
    required_slots:
      - city
      - check_in
      - check_out
      - guests
      - hotel_id
      - room_type_id
      - meal_plan
      - guest_name
      - guest_email
      - guest_phone

session_config:
  session_expiration_time: 60   # minutes
  carry_over_slots_to_new_session: false
